# ═══════════════════════════════════════════════════════
# 流星运行时 — 中文量词类型系统 (classifiers.toml)
# ═══════════════════════════════════════════════════════
#
# 量词(量词/分类词)是中文特有的语法元素。
# 在流星运行时中，量词构成类型系统的基础：
#   - 每个量词对应一个类型类别
#   - 名词必须搭配正确的量词
#   - 量词约束了操作的语义
#
# 设计原则:
#   词汇即类型系统 — 量词分类 = 类型层次
#

[通用量词]
个 = "通用"
只 = "动物/小件"

[形状量词]
条 = "长形/河流/消息/鱼"
本 = "书籍/文件/册"
片 = "平面/土地"
颗 = "小圆/珠子/星"
块 = "块状/土地"
张 = "平面/纸张/桌子"
根 = "细长/棍子/绳子"
粒 = "颗粒/种子"
滴 = "液体"

[机器量词]
台 = "机器/设备/计算机"
套 = "套装/设备组合"
架 = "飞机/机器框架"

[人员量词]
位 = "人(敬称)"
名 = "人(中性)"
个 = "人(通用)"  # 口语中可用

[船只量词]
艘 = "大型船只/舰艇"
条 = "小船(口语)"

[数量量词]
次 = "次数/循环"
遍 = "遍数"
趟 = "趟数"
步 = "步骤"
轮 = "轮次/回合"

[度量量词]
海里 = "海上距离"
节 = "航速"
吨 = "重量"
米 = "长度"
秒 = "时间"
小时 = "时间"

[信息量词]
封 = "信件"
份 = "文件/报告"
项 = "条款/项目"
则 = "新闻/消息"

[容器量词]
杯 = "杯装"
瓶 = "瓶装"
桶 = "桶装"
箱 = "箱装"

# ═══════════════════════════════════════════════════════
# 量词 → 类型层次映射
# ═══════════════════════════════════════════════════════

[类型层次]
实体 = ["个", "只", "条", "本", "台", "套", "架", "张", "块", "片", "根", "颗", "粒"]
人员 = ["位", "名"]
船只 = ["艘"]
数量 = ["次", "遍", "趟", "步", "轮"]
距离 = ["海里", "米"]
速度 = ["节"]
重量 = ["吨"]
时间 = ["秒", "小时"]
信息 = ["封", "份", "项", "则"]
容器 = ["杯", "瓶", "桶", "箱"]

# ═══════════════════════════════════════════════════════
# 量词 → 推荐名词（用于智能补全和验证）
# ═══════════════════════════════════════════════════════

[推荐名词]
艘 = ["船", "舰", "艇", "航母", "驱逐舰"]
台 = ["机器", "计算机", "发动机", "雷达", "设备"]
本 = ["书", "文件", "手册", "日志", "册"]
条 = ["河", "鱼", "消息", "指令", "船"]
位 = ["人", "先生", "女士", "船长", "工程师"]
名 = ["人", "学生", "水手", "船员", "员工"]
只 = ["猫", "狗", "鸟", "手", "眼睛"]
次 = ["循环", "计算", "尝试", "实验"]
封 = ["信", "邮件", "电报"]
份 = ["文件", "报告", "清单", "计划"]
节 = ["课", "航速", "车厢"]
海里 = ["距离", "航程"]
吨 = ["货物", "排水量", "重量"]
